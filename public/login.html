<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family: Arial;
background:#d8ecff;
text-align:center;
}

.caja{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
}

input{
width:200px;
padding:6px;
margin:5px;
}

button{
padding:6px 10px;
margin:5px;
}
</style>

</head>

<body>

<h2>Iniciar Sesión</h2>

<div class="caja">

<input type="email" id="email" placeholder="Correo"><br>
<input type="password" id="password" placeholder="Contraseña"><br>

<button onclick="login()">Entrar</button>
<button onclick="registro()">Registrarme</button>

<p id="msg"></p>

</div>

<script>

async function registro(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let res=await fetch("/registro",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({email,password})
})

let data=await res.json()

document.getElementById("msg").innerText=data.mensaje || data.error
}

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let res=await fetch("/login",{
method:"POST",
headers:{ "Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({email,password})
})

let data=await res.json()

if(res.ok){
window.location.href="crud.html"
}else{
document.getElementById("msg").innerText=data.mensaje
}

}

</script>

</body>
</html>
